<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交成功</title>
    <link rel="stylesheet" href="https://res.wx.qq.com/open/libs/weui/2.5.11/weui.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-icon {
            text-align: center;
            padding: 40px 0 20px;
        }
        .success-icon svg {
            width: 80px;
            height: 80px;
            fill: #1aad19;
        }
        .success-title {
            text-align: center;
            font-size: 20px;
            color: #1aad19;
            margin-bottom: 30px;
        }
        .info-section {
            margin: 20px 15px;
            background: #fff;
            border-radius: 8px;
            padding: 15px;
        }
        .info-section h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 10px;
        }
        .info-item {
            display: flex;
            padding: 8px 0;
            font-size: 14px;
        }
        .info-label {
            color: #999;
            width: 100px;
            flex-shrink: 0;
        }
        .info-value {
            color: #333;
            flex: 1;
        }
        .course-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .course-tag {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
        }
        .file-list {
            margin-top: 10px;
        }
        .file-item {
            padding: 8px 0;
            color: #576b95;
            font-size: 14px;
        }
        .back-btn {
            margin: 30px 15px;
        }
    </style>
</head>
<body>
    <div class="success-icon">
        <svg viewBox="0 0 1024 1024">
            <path d="M512 64C264.6 64 64 264.6 64 512s200.6 448 448 448 448-200.6 448-448S759.4 64 512 64z m193.5 301.7l-210.6 292c-12.7 17.7-39 17.7-51.7 0L318.5 484.9c-3.8-5.3 0-12.7 6.5-12.7h46.9c10.2 0 19.9 4.9 25.9 13.3l71.2 98.8 157.2-218c6-8.3 15.6-13.3 25.9-13.3H699c6.5 0 10.3 7.4 6.5 12.7z"/>
        </svg>
    </div>
    <div class="success-title">提交成功！</div>

    <div class="info-section">
        <h3>基本信息</h3>
        <div class="info-item">
            <div class="info-label">姓名：</div>
            <div class="info-value" id="name"></div>
        </div>
        <div class="info-item">
            <div class="info-label">性别：</div>
            <div class="info-value" id="sex"></div>
        </div>
        <div class="info-item">
            <div class="info-label">学号：</div>
            <div class="info-value" id="student_id"></div>
        </div>
        <div class="info-item">
            <div class="info-label">电话：</div>
            <div class="info-value" id="phone"></div>
        </div>
        <div class="info-item">
            <div class="info-label">原学院：</div>
            <div class="info-value" id="college"></div>
        </div>
        <div class="info-item">
            <div class="info-label">原专业：</div>
            <div class="info-value" id="major"></div>
        </div>
        <div class="info-item">
            <div class="info-label">四级成绩：</div>
            <div class="info-value" id="cet4"></div>
        </div>
        <div class="info-item">
            <div class="info-label">必修绩点：</div>
            <div class="info-value" id="gpa"></div>
        </div>
        <div class="info-item">
            <div class="info-label">是否降级：</div>
            <div class="info-value" id="downgrade"></div>
        </div>
        <div class="info-item">
            <div class="info-label">毕业选择：</div>
            <div class="info-value" id="choice"></div>
        </div>
        <div class="info-item">
            <div class="info-label">是否读博：</div>
            <div class="info-value" id="phd"></div>
        </div>
    </div>

    <div class="info-section" id="courseSection" style="display: none;">
        <h3>课程修读情况</h3>
        <div class="info-item">
            <div class="info-label">完成度：</div>
            <div class="info-value" id="percentage"></div>
        </div>
        <div class="course-list" id="courseList"></div>
    </div>

    <div class="info-section" id="fileSection" style="display: none;">
        <h3>上传附件</h3>
        <div class="file-list" id="fileList"></div>
    </div>

    <div class="back-btn">
        <a href="index.html" class="weui-btn weui-btn_primary">返回首页</a>
    </div>

    <script>
        const COURSE_NAMES = {
            1: '思想道德与法治', 2: '通用英语I-1/通用英语II-1', 3: '体育-1', 4: '新生研讨课',
            5: '大学生心理健康', 6: '微积分（Ⅰ）-1', 7: '计算机系统及人工智能导论', 8: '程序设计基础',
            9: '国家安全教育', 10: '离散数学', 11: '军事技能', 12: '线性代数（理工）',
            13: '中国近现代史纲要', 14: '通用英语I-2/通用英语II-2', 15: '体育-2', 16: '军事理论',
            17: '微积分（Ⅰ）-2', 18: '工程训练（Ⅰ）', 19: '数据结构与算法', 20: '网络安全管理与法律法规',
            21: '中共党史/社会主义发展史/改革开放史/新中国史/中华民族发展史'
        };

        const FILE_TYPE_NAMES = {
            'transcript': '可信电子成绩单',
            'cet4_certificate': '四级考试成绩单',
            'other': '其他证明材料'
        };

        // 从sessionStorage获取提交的数据
        const data = JSON.parse(sessionStorage.getItem('submissionData') || '{}');

        // 填充基本信息
        document.getElementById('name').textContent = data.name || '-';
        document.getElementById('sex').textContent = data.sex || '-';
        document.getElementById('student_id').textContent = data.student_id || '-';
        document.getElementById('phone').textContent = data.phone || '-';
        document.getElementById('college').textContent = data.college || '-';
        document.getElementById('major').textContent = data.major || '-';
        document.getElementById('cet4').textContent = data.cet4 || '-';
        document.getElementById('gpa').textContent = data.gpa || '-';
        document.getElementById('downgrade').textContent = data.downgrade || '-';
        document.getElementById('choice').textContent = data.choice || '-';
        document.getElementById('phd').textContent = data.phd || '-';

        // 填充课程信息
        if (data.selected_courses && data.selected_courses.length > 0) {
            document.getElementById('courseSection').style.display = 'block';
            const percentage = data.percentage || 0;
            const percentageEl = document.getElementById('percentage');
            percentageEl.textContent = percentage + '%';
            percentageEl.style.color = percentage >= 70 ? '#1aad19' : (percentage >= 50 ? '#ff9500' : '#e64340');

            const courseList = document.getElementById('courseList');
            data.selected_courses.forEach(cid => {
                const tag = document.createElement('div');
                tag.className = 'course-tag';
                tag.textContent = COURSE_NAMES[cid] || '未知课程';
                courseList.appendChild(tag);
            });
        }

        // 填充文件信息
        if (data.files && data.files.length > 0) {
            document.getElementById('fileSection').style.display = 'block';
            const fileList = document.getElementById('fileList');
            data.files.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.textContent = `${FILE_TYPE_NAMES[file.file_type] || file.file_type}: ${file.name}`;
                fileList.appendChild(item);
            });
        }

        // 清除sessionStorage
        sessionStorage.removeItem('submissionData');
    </script>
</body>
</html>
